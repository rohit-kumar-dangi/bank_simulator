<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>
    <div>
        <form method="POST" action="/register" id="register_form" class="form">
            <div class="option">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Name" required>
            </div>

            <div class="option">
                <label for="mobile">Mobile No</label>
                <input type="tel" name="mobile" id="mobile" maxlength="10" title="Enter a valid 10-digit mobile number" placeholder="Mobile" required>
            </div>

            <div class="option">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Email" required>
            </div>

            <div class="option">
                <label for="aadhaar">Aadhaar No.</label>
                <input type="text" name="aadhaar" id="aadhaar" maxlength="12" minlength="12" title="Enter a valid 12-digit Aadhaar number" placeholder="Aadhaar" required>
            </div>

            <div class="option">
                <label for="pan">Pan No.</label>
                <input type="text" name="pan" id="pan" maxlength="10" minlength="10" placeholder="PAN" required>
            </div>

            <div class="option">
                <label for="address">Address</label>
                <textarea name="address" id="address" placeholder="Address" required></textarea>
            </div>

            <div class="option">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Password" required>
            </div>

            <div class="option">
                <button type="submit">Register</button>
            </div>
        </form>
    </div>
</body>
</html>
