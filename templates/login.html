<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <script>
            alert("{{ messages[0] }}");
        </script>
        {% endif %}
        {% endwith %}
    </div>
    
    <div>
        <form method="POST" action="/login" id="login_form" class="form">
            <div class="option">
                <label for="username">User Id</label>
                <input type="text" id="username" name="userid">
            </div>
            <div class="option">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
            </div>
            <div>
                <button type="submit">Login</button>
            </div>
            <div>
                <label for="register">Don't have an account?</label>
                <a href="/register" id="register">Sign up</a>
            </div>
        </form>
    </div>
</body>
</html>
